services:
  lakehouse:
    build: .
    env_file:
      - .env
    volumes:
      - ./raw:/app/raw
      - ./data:/app/data
      - ./metadata:/app/metadata
      - ./reports:/app/reports
      - ./configs:/app/configs
      - ./src:/app/src
      - ./tests:/app/tests
    command: ["python", "-m", "lakehouse.jobs.run_bronze", "--env", "dev"]
