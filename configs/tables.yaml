bronze:
  raw_json:
    path: bronze/raw_json
    description: Raw Riot API payloads with ingestion metadata.
silver:
  matches:
    path: silver/matches
    primary_key: match_id
  participants:
    path: silver/participants
    primary_key: [match_id, participant_id]
  teams:
    path: silver/teams
    primary_key: [match_id, team_id]
  summoners:
    path: silver/summoners
    primary_key: puuid
  ranked:
    path: silver/ranked
    primary_key: [league_id, summoner_id, puuid, queue, tier, rank]
  timeline_frames:
    path: silver/timeline_frames
    primary_key: [match_id, frame_index]
  timeline_events:
    path: silver/timeline_events
    primary_key: [match_id, frame_index, event_index]
