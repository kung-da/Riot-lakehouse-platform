environment: dev
project_root: .
raw_root: raw
lakehouse_root: data/lakehouse
checkpoint_root: metadata/checkpoints
report_root: reports
default_format: parquet
write_mode: append
partition_columns:
  bronze:
    - dataset
    - ingest_date
  silver:
    - dataset
    - game_date
spark:
  app_name: riot-lakehouse-dev
  master: local[2]
  enable_delta: false
bronze:
  max_records_per_batch: 100
  max_bytes_per_batch: 67108864
  output_partitions: 1
  dataset_max_files:
    timelines: 500
  dataset_batch_sizes:
    timelines: 5
  dataset_max_bytes_per_batch:
    timelines: 8388608
riot:
  platform: vn2
  region: sea
