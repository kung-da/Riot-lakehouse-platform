environment: dev
project_root: .
raw_root: raw
lakehouse_root: data/lakehouse
checkpoint_root: metadata/checkpoints
report_root: reports
default_format: parquet
write_mode: append
partition_columns:
  bronze:
    - dataset
    - ingest_date
  silver:
    - dataset
    - game_date
spark:
  app_name: riot-lakehouse-dev
  master: local[4]
  enable_delta: false
  driver_memory: 4g
  shuffle_partitions: 2
  default_parallelism: 2
bronze:
  max_records_per_batch: 1000
  max_bytes_per_batch: 134217728
  output_partitions: 1
  dataset_max_files:
    timelines: 5414
  dataset_batch_sizes:
    matches: 1000
    timelines: 25
    summoners: 1000
    ranked: 20
  dataset_max_bytes_per_batch:
    matches: 134217728
    timelines: 67108864
    summoners: 1048576
    ranked: 33554432
riot:
  platform: vn2
  region: sea
